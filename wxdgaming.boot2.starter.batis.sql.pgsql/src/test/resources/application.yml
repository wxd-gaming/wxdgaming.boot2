core:
  executor:
    basic:
      coreSize: 2                        #默认线程池的核心线程数
      maxQueueSize: 10000                #队列超过就会打印异常
    logic:
      coreSize: 2                       #逻辑线程池
      maxQueueSize: 50000                #队列超过就会打印异常
    virtual:
      coreSize: 100                      #虚拟线程池
      maxQueueSize: 1500000              #队列超过就会打印异常

scheduled:
  executor:
    coreSize: 1
    maxQueueSize: 500
http:
  client:
    routeMaxSize: 20                    #连接池的核心连接数
    totalMaxSize: 300                   #连接池的最大连接数
    resetTimeM: 30                      #连接池重置时间，时间太长连接池会异常 单位分钟
    sslProtocol: TLS                    #ssl 类型
    connectTimeOut: 3000                #创建连接超时时间
    connectionRequestTimeout: 1000      #从连接池获取连接超时
    keepAliveTimeout: 30000             #连接有效时间
    readTimeout: 3000                   #读取超时时间

server:
  port: 18888
  compression:
    enabled: true
    mime-types:
      - "application/json"
      - "application/xml"
      - "text/html"
      - "text/xml"
      - "text/plain"
      - "text/css"
      - "text/javascript"
      - "application/javascript"
    min-response-size: 30720

spring:
  profiles:
    active: [ ]
  freemarker:
    enabled: false
  web:
    resources:
      static-locations: classpath:/public/,file:./target/out/
db:
  pgsql:
    debug: false                                                 #调试模式将会显示sql语句
    driverClassName: "org.postgresql.Driver"
    url: "jdbc:postgresql://10.28.0.26:5432/pgtest"
    username: "postgres"
    password: "test"
    scanPackage: ["run.entity"]                   #扫描路径
    connectionTimeoutMs: 2000                                 #链接超时单位毫秒
    idleTimeoutM: 10                                          #空闲超时单位分钟
    minPoolSize: 5                                            #最小连接数
    maxPoolSize: 20                                           #最大连接数
    batchSubmitSize: 500                                      #批量提交数量
    batchThreadSize: 4                                        #批量提交线程数
    cacheArea: 64                                             #缓存分区