<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷你贴吧</title>
    <link rel="stylesheet" href="css/styles.css?v=20260427">
    <script src="js/app.js?v=20260427"></script>
</head>
<body>
    <div class="header">
        <h1 onclick="navigate('list')" style="cursor:pointer">&#128214; 迷你贴吧</h1>
        <div class="user-area" id="userArea"></div>
    </div>

    <div class="container">
        <!-- 列表视图 -->
        <div class="list-view" id="listView">
            <!-- 未登录提示 -->
            <div class="login-hint" id="loginHint" style="display:none">
                &#128274; 请先 <a onclick="showAuthModal()">登录</a> 后发帖、回复和点赞
            </div>

            <!-- 帖子列表 -->
            <div id="postList"></div>
            <div class="pagination" id="pagination"></div>
        </div>

        <!-- 发帖视图 -->
        <div class="create-view" id="createView">
            <div class="back-btn" onclick="history.back()">&#8592; 返回</div>
            <div class="create-page">
                <h2>&#9997; 发布新帖</h2>
                <div class="input-group">
                    <label>内容</label>
                    <textarea id="contentInput" placeholder="分享你的想法..."></textarea>
                </div>
                <div class="input-group">
                    <label>&#128247; 图片（最多9张，已有视频时不可上传）</label>
                    <div class="form-actions">
                        <label class="file-upload-btn" id="imageUploadBtn">
                            &#128247; 选择图片
                            <input type="file" id="imageInput" accept="image/*" multiple onchange="selectImages(this)" />
                        </label>
                    </div>
                    <div class="image-preview" id="imagePreview"></div>
                </div>
                <div class="input-group">
                    <label>&#127909; 视频（最多1个，已有图片时不可上传，支持 mp4/webm/ogg，最大100MB）</label>
                    <div class="form-actions">
                        <label class="file-upload-btn" id="videoUploadBtn">
                            &#127909; 选择视频
                            <input type="file" id="videoInput" accept="video/*" onchange="selectVideo(this)" />
                        </label>
                    </div>
                    <div class="image-preview" id="videoPreview"></div>
                </div>
                <div class="input-group">
                    <label>选项</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="anonymousCheck" />
                            <span>&#128119; 匿名发帖（其他用户看不到你的身份）</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="privateCheck" />
                            <span>&#128274; 仅自己可见（其他用户看不到此帖）</span>
                        </label>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" onclick="submitPost()">&#9997; 发布</button>
                    <button class="btn btn-outline" onclick="clearForm()">清空</button>
                </div>
            </div>
        </div>

        <!-- 详情视图 -->
        <div class="detail-view" id="detailView">
            <div class="back-btn" onclick="history.back()">&#8592; 返回</div>
            <div id="detailContent"></div>
        </div>

        <!-- 用户主页视图 -->
        <div class="user-view" id="userView">
            <div class="back-btn" onclick="history.back()">&#8592; 返回</div>
            <div class="user-profile" id="userProfile"></div>
            <div class="user-tabs">
                <div class="tab active" onclick="switchUserTab('posts')" id="tabPosts">发帖</div>
                <div class="tab" onclick="switchUserTab('replies')" id="tabReplies">跟帖</div>
            </div>
            <div id="userPostsList"></div>
            <div id="userRepliesList" style="display:none"></div>
            <div class="pagination" id="userPagination"></div>
        </div>

        <!-- 消息视图 -->
        <div class="notice-view" id="noticeView">
            <div class="back-btn" onclick="history.back()">&#8592; 返回</div>
            <div id="noticeList"></div>
        </div>
    </div>

    <!-- 登录/注册弹窗 -->
    <div class="modal-overlay" id="authModal">
        <div class="modal" style="position:relative">
            <div class="close-btn" onclick="closeAuthModal()">&#10005;</div>
            <h2>迷你贴吧</h2>
            <div class="tab-switch">
                <div class="tab active" onclick="switchTab('login')" id="tabLogin">登录</div>
                <div class="tab" onclick="switchTab('register')" id="tabRegister">注册</div>
            </div>
            <!-- 登录表单 -->
            <div id="loginForm">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="用户名" />
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="密码" />
                </div>
                <button class="btn-submit" onclick="doLogin()">登 录</button>
            </div>
            <!-- 注册表单 -->
            <div id="registerForm" style="display:none">
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="用户名（2-20位）" />
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder="密码（至少4位）" />
                </div>
                <div class="input-group">
                    <input type="text" id="regNickname" placeholder="昵称（留空则同用户名）" />
                </div>
                <button class="btn-submit" onclick="doRegister()">注 册</button>
            </div>
        </div>
    </div>

    <!-- 图片查看器 -->
    <div class="image-viewer" id="imageViewer" onclick="closeViewer()">
        <img id="viewerImage" src="" />
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
</body>
</html>
