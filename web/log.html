<style>
    :root {
        --primary-color: #1677ff;
        --border-color: #d0d7e2;
        --hover-color: #f3f7ff;
        --success-color: #2ca24f;
        --warning-color: #d98c07;
        --page-bg-start: #f4f8ff;
        --page-bg-end: #eef3fb;
        --panel-bg: #ffffff;
        --panel-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        --panel-radius: 12px;
    }

    .log_content {
        display: flex;
        flex-direction: column;
        height: 100%;
        gap: 10px;
        padding: 10px;
        background: linear-gradient(135deg, var(--page-bg-start), var(--page-bg-end));
    }

    .log_filter,
    .log_table,
    .log_bottom {
        background-color: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: var(--panel-radius);
        box-shadow: var(--panel-shadow);
    }

    .log_filter {
        min-height: 120px;
        padding: 14px 16px;
    }

    .log_table {
        flex: 1;
        min-height: 0;
        padding: 10px;
        overflow: hidden;
    }

    .log_bottom {
        min-height: 52px;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    @media (max-width: 900px) {
        .log_content {
            padding: 8px;
            gap: 8px;
        }

        .log_filter,
        .log_table,
        .log_bottom {
            border-radius: 10px;
        }

        .log_filter {
            padding: 12px;
        }

        .log_table {
            padding: 8px;
        }

        .log_bottom {
            padding: 8px 10px;
            min-height: 48px;
        }
    }
</style>
<div class="log_content">
    <!--过滤器-->
    <div class="log_filter">

    </div>
    <!--日志展示的tabl-->
    <div class="log_table">

    </div>
    <div class="log_bottom">

    </div>
</div>
<script>
    async function loading() {
        /*先加载table*/
        await loadTemplate('log/log-table.html', '.log_table', '正在加载展示栏...');
        /*然后加载查询条件*/
        await loadTemplate('log/log-filter.html', '.log_filter', '正在加载查询条件...');
        /*然后加载查询条件*/
        await loadTemplate('log/log-page.html', '.log_bottom', '正在加载分页查询...');
        cleanThead();
        addHead("时间", "width:200px;");
        addHead("日志", "");
        cleanTbody();
        for (let i = 0; i < 100; i++) {
            let row = [];
            row.push({"content": new Date().toLocaleString(), "style": "width:200px;"});
            row.push({"content": `日志${i}<br>日志${i}`, "style": ""});
            addRow(row);
        }
    }

    loading();
    console.log("log.html")
</script>
