<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 我的网站</title>
    <!-- 引入公共样式 -->
    <link rel="stylesheet" href="css/common.css">
    <!-- 引入jQuery（使用CDN，也可下载到本地） -->
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/wxd.common.js"></script>
</head>
<body>
<div id="root">
    <div class="left">

    </div>
    <div class="right content-container">
    </div>
</div>
</body>
</html>
<script>

    function refreshContent(flag) {
        // 设置或覆盖 pagetype 参数
        setUrlParam('pagetype', flag);
        return wxd.loader
            .containerSelector('.content-container')
            .templateUrl(`${flag}.html`)
            .loadingText('正在加载内容...')
            .load();
    }

    /**
     * 加载模板并插入到指定容器
     * @param {string} templateUrl 模板文件路径
     * @param {string} containerSelector 容器选择器
     * @param {string} loadingText 加载提示文本
     */
    function loadTemplate(templateUrl, containerSelector, loadingText) {
        return wxd.loader
            .templateUrl(templateUrl)
            .containerSelector(containerSelector)
            .loadingText(loadingText)
            .load();
    }

    loadTemplate('nav.html', '.left', '正在加载内容...');

    // 示例调用
    let pageType = getUrlParam('pagetype');
    if (pageType == null || pageType === "" || pageType === undefined) {
        refreshContent("main");
    }


    async function testAwaitAlert() {
        let consumeAlert = wxd.newAlert
            .title("提示")
            .content(`<h1>欢迎来到我的网站</h1>dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd`)
            .confirmText("确定")
            .confirmCall(() => {
                console.log("ddd");
            })
            .cancelText("取消");
        await consumeAlert.show();
        console.log("阻塞的alert");
        wxd.notice.append("阻塞的alert结束");
    }

    testAwaitAlert();
    wxd.notice.append("这是一条普通信息", NoticeTypeStyles.info);
    wxd.notice.append("操作失败，请重试！", NoticeTypeStyles.error);
    wxd.notice.append("操作成功完成", NoticeTypeStyles.success);
    wxd.notice.append("请注意潜在风险", NoticeTypeStyles.warning);
    setTimeout(() => {
        wxd.notice.append("第二条提示", NoticeTypeStyles.info, 5000);
    }, 1000);
</script>
