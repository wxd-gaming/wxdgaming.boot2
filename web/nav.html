<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    .nav {
        --nav-bg-1: #15324f;
        --nav-bg-2: #1f4f75;
        --nav-panel: rgba(255, 255, 255, 0.08);
        --nav-panel-hover: rgba(255, 255, 255, 0.14);
        --nav-text: #eaf4ff;
        --nav-muted: #b6cee6;
        --nav-active: #4db2ff;
        --nav-active-2: #2f93e3;
        --nav-border: rgba(255, 255, 255, 0.14);

        width: 100%;
        height: 100%;
        overflow: auto;
        position: relative;
        color: var(--nav-text);
        background:
            radial-gradient(circle at 20% 0%, rgba(77, 178, 255, 0.26) 0%, rgba(77, 178, 255, 0) 42%),
            linear-gradient(170deg, var(--nav-bg-2), var(--nav-bg-1));
        padding: 12px 10px 74px;
    }

    .nav::-webkit-scrollbar {
        width: 8px;
    }

    .nav::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.28);
        border-radius: 8px;
    }

    .nav ul {
        list-style: none;
        margin: 0 0 10px;
        padding: 4px;
        border: 1px solid var(--nav-border);
        border-radius: 12px;
        background-color: var(--nav-panel);
        backdrop-filter: blur(3px);
    }

    .nav ul:last-of-type {
        margin-bottom: 0;
    }

    .nav ul > li {
        position: relative;
        border-radius: 10px;
        padding: 11px 12px;
        cursor: pointer;
        user-select: none;
        font-size: 15px;
        font-weight: 600;
        line-height: 1.4;
        transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .nav ul > li:hover {
        background-color: var(--nav-panel-hover);
    }

    .nav ul > li > i {
        width: 18px;
        margin-right: 8px;
        color: #d4ebff;
    }

    .nav ul > li::after {
        content: "\f078";
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        position: absolute;
        right: 12px;
        top: 14px;
        font-size: 12px;
        color: var(--nav-muted);
        transition: transform 0.2s ease, color 0.2s ease;
    }

    .nav ul > li.menu-open::after {
        transform: rotate(180deg);
        color: #ffffff;
    }

    .nav ul dl {
        display: none;
        margin: 8px 0 2px;
        padding: 0;
        border-radius: 10px;
        border: 1px solid var(--nav-border);
        background: rgba(7, 32, 56, 0.34);
    }

    .nav ul dd {
        margin: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav ul dd:last-child {
        border-bottom: none;
    }

    .nav ul dd a {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--nav-text);
        text-decoration: none;
        font-size: 14px;
        padding: 10px 12px;
        transition: background-color 0.2s ease, color 0.2s ease;
    }

    .nav ul dd a i {
        width: 16px;
        color: #9ec7ea;
    }

    .nav ul dd:hover a {
        background-color: rgba(255, 255, 255, 0.08);
        color: #ffffff;
    }

    .nav ul dd.active a {
        background: linear-gradient(90deg, var(--nav-active), var(--nav-active-2));
        color: #ffffff;
        font-weight: 600;
    }

    .nav ul dd.active a i {
        color: #ffffff;
    }

    .nav .footer {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 10px;
        border-radius: 10px;
        border: 1px solid var(--nav-border);
        background: rgba(0, 0, 0, 0.18);
        color: var(--nav-muted);
        text-align: center;
        line-height: 1.5;
        font-size: 12px;
        padding: 8px 6px;
    }
</style>
<div class="nav">
    <ul>
        <li>
            <i class="fas fa-cogs"></i> 管理
            <dl>
                <dd>
                    <a href="javascript:void(0)" tag="main" onclick="refreshContent('main')">
                        <i class="fas fa-home"></i> 首页
                    </a>
                </dd>
                <dd>
                    <a href="javascript:void(0)" tag="main" onclick="refreshContent('main')">
                        <i class="fas fa-house"></i> 控制台
                    </a>
                </dd>
            </dl>
        </li>
    </ul>
    <ul>
        <li>
            <i class="fas fa-file-alt"></i> 日志
            <dl>
                <dd>
                    <a href="javascript:void(0)" tag="log" onclick="refreshContent('log')">
                        <i class="fas fa-list"></i> 日志列表
                    </a>
                </dd>
                <dd>
                    <a href="javascript:void(0)" tag="log" onclick="refreshContent('log')">
                        <i class="fas fa-magnifying-glass"></i> 日志查询
                    </a>
                </dd>
            </dl>
        </li>
    </ul>
    <div class="footer">
        © 2026 我的站点 保留所有权利
        <br>
        联系电话：15388152619
    </div>
</div>
<script>
    document.querySelectorAll('.nav ul').forEach(menuGroup => {
        let currentOpenMenu = null;

        menuGroup.querySelectorAll(':scope > li').forEach(item => {
            item.addEventListener('click', function (event) {
                event.stopPropagation();
                const subMenu = this.querySelector('dl');
                if (!subMenu) {
                    return;
                }

                if (currentOpenMenu === subMenu) {
                    subMenu.style.display = 'none';
                    this.classList.remove('menu-open');
                    currentOpenMenu = null;
                } else {
                    menuGroup.querySelectorAll(':scope > li').forEach(li => {
                        const dl = li.querySelector(':scope > dl');
                        if (dl) {
                            dl.style.display = 'none';
                        }
                        li.classList.remove('menu-open');
                    });

                    subMenu.style.display = 'block';
                    this.classList.add('menu-open');
                    currentOpenMenu = subMenu;
                }
            });
        });

        menuGroup.querySelectorAll('dd a').forEach(link => {
            link.addEventListener('click', function (event) {
                event.preventDefault();
                event.stopPropagation();

                document.querySelectorAll('.nav ul dd').forEach(dd => {
                    dd.classList.remove('active');
                });

                const currentDd = this.closest('dd');
                currentDd.classList.add('active');
            });
        });
    });

    function setActiveMenu() {
        let pageType = getUrlParam('pagetype');
        if (pageType == null || pageType === '' || pageType === undefined) {
            return;
        }

        let elementNodeListOf = document.querySelectorAll('.nav ul dd a');
        for (const da of elementNodeListOf) {
            if (da.getAttribute('tag') === pageType) {
                const ddElement = da.parentElement;
                const dlElement = ddElement.parentElement;
                const liElement = dlElement.parentElement;

                if (liElement && typeof liElement.click === 'function') {
                    dlElement.style.display = 'block';
                    liElement.classList.add('menu-open');
                }
                da.click();
                break;
            }
        }
    }

    $(() => {
        setTimeout(setActiveMenu, 100);
    });
</script>
